<!DOCTYPE html>
<html lang="en" data-mode="dark" data-accent="teal">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog Post Helper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14161A;
    --ink-raised: #1C1F26;
    --paper: #ECE6D8;
    --paper-dim: #B9B3A6;
    --rule: #33363E;
    --error: #E08A6A;
    --accent: #F2B84B;
    --accent2: #4A9B8E;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Source Serif 4', serif;
  }

  html[data-mode="light"] {
    --ink: #F5F1E7;
    --ink-raised: #FBF8F0;
    --paper: #23211B;
    --paper-dim: #6B6656;
    --rule: #DAD3C2;
    --error: #B14E30;
  }

  html[data-accent="rose"]    { --accent: #F2708A; --accent2: #8A5470; }
  html[data-accent="violet"]  { --accent: #B98CF2; --accent2: #6F5FA3; }
  html[data-accent="mono"]    { --accent: #D8D8D8; --accent2: #8C8C8C; }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--mono);
    min-height: 100%;
  }

  body {
    display: flex;
    justify-content: center;
    padding: clamp(20px, 5vw, 48px) 16px 80px;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .machine { width: 100%; max-width: 700px; }

  a, button, input, select {
    font: inherit;
  }

  :focus-visible {
    outline: 2px solid var(--accent2);
    outline-offset: 2px;
    border-radius: 3px;
  }

  .titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--ink-raised);
    border: 1px solid var(--rule);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    flex-wrap: wrap;
  }

  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--rule); }

  .titlebar-label {
    margin-left: 8px;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--paper-dim);
    flex: 1;
  }

  .theme-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mode-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--paper-dim);
    border-radius: 5px;
    padding: 5px 9px;
    font-size: 11px;
    cursor: pointer;
  }
  .mode-btn:hover { color: var(--paper); border-color: var(--accent2); }

  .swatches { display: flex; gap: 6px; }
  .swatch {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
  }
  .swatch[data-c="teal"]   { background: linear-gradient(135deg, #F2B84B, #4A9B8E); }
  .swatch[data-c="rose"]   { background: linear-gradient(135deg, #F2708A, #8A5470); }
  .swatch[data-c="violet"] { background: linear-gradient(135deg, #B98CF2, #6F5FA3); }
  .swatch[data-c="mono"]   { background: linear-gradient(135deg, #D8D8D8, #8C8C8C); }
  .swatch[aria-pressed="true"] { border-color: var(--paper); }

  .panel {
    border: 1px solid var(--rule);
    border-radius: 0 0 8px 8px;
    background: var(--ink-raised);
    padding: clamp(22px, 4vw, 36px) clamp(18px, 4vw, 32px) 32px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .eyebrow {
    font-size: 12px;
    color: var(--accent2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 0 0 6px;
  }

  h1 {
    font-weight: 600;
    font-size: clamp(19px, 4vw, 22px);
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  .sub { font-size: 13px; color: var(--paper-dim); margin: 0 0 24px; line-height: 1.5; }

  fieldset { border: none; margin: 0; padding: 0; }
  legend { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  .field-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 4px 4px 4px 14px;
  }
  .field-row:focus-within { border-color: var(--accent2); }

  .prompt-glyph { color: var(--accent2); font-size: 14px; user-select: none; }

  #topic {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--paper);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 0;
    min-width: 0;
  }
  #topic::placeholder { color: var(--paper-dim); opacity: 0.6; }

  .options-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 12px;
  }

  .select-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 5px;
    padding: 7px 10px;
    font-size: 12px;
  }
  .select-wrap label { color: var(--paper-dim); }
  .select-wrap select {
    background: transparent;
    color: var(--paper);
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 12px;
  }
  .select-wrap select option { background: var(--ink-raised); color: var(--paper); }

  .variants-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 5px;
    padding: 7px 10px;
    font-size: 12px;
    color: var(--paper-dim);
    cursor: pointer;
  }
  .variants-toggle input { accent-color: var(--accent2); }

  button {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--ink);
    background: var(--accent);
    border: none;
    border-radius: 4px;
    padding: 11px 18px;
    cursor: pointer;
    white-space: nowrap;
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  button:hover:not(:disabled) { filter: brightness(1.1); }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { background: var(--rule); color: var(--paper-dim); cursor: default; }

  .generate-row { margin-top: 14px; display: flex; }
  .generate-row button { flex: 1; padding: 12px 18px; }

  .hint { font-size: 11px; color: var(--paper-dim); margin: 10px 2px 0; }

  .output-wrap { margin-top: 28px; min-height: 20px; }

  .output-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--paper-dim);
    margin-bottom: 12px;
  }
  .output-label .line { flex: 1; height: 1px; background: var(--rule); }

  .draft-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin: 0 0 10px;
  }

  .draft-card {
    background: var(--ink);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--accent2);
    border-radius: 4px;
    padding: 18px 20px;
    margin-bottom: 14px;
    animation: rise 0.25s ease both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .draft {
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.7;
    color: var(--paper);
    white-space: pre-wrap;
  }

  .cursor {
    display: inline-block;
    width: 8px; height: 15px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s step-start infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .draft-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .word-count { font-size: 11px; color: var(--paper-dim); letter-spacing: 0.04em; }

  .small-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--paper-dim);
    padding: 6px 10px;
    font-size: 11px;
    border-radius: 4px;
  }
  .small-btn:hover:not(:disabled) { color: var(--paper); border-color: var(--accent2); background: transparent; filter: none; }

  .refine-row {
    display: flex;
    gap: 8px;
    margin-top: 18px;
  }
  .refine-row input {
    flex: 1;
    background: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 5px;
    padding: 9px 12px;
    color: var(--paper);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    min-width: 0;
  }
  .refine-row input:focus { border-color: var(--accent2); }
  .refine-row button { padding: 9px 14px; font-size: 12px; }

  .status { font-size: 13px; color: var(--paper-dim); display: flex; align-items: center; gap: 8px; }

  .spinner {
    width: 10px; height: 10px;
    border: 2px solid var(--rule);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    font-size: 13px;
    color: var(--error);
    background: color-mix(in srgb, var(--error) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--error) 30%, transparent);
    border-radius: 4px;
    padding: 12px 14px;
  }

  @media (max-width: 480px) {
    .field-row { flex-wrap: wrap; padding: 10px 12px; }
    #topic { width: 100%; order: 1; padding: 6px 0; }
    .prompt-glyph { order: 0; }
    .generate-row button { width: 100%; }
    .field-row > button { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .cursor, .spinner, .draft-card { animation: none; }
  }
</style>
</head>
<body>

<div class="machine">
  <div class="titlebar">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span class="titlebar-label">blog-post-helper.sh</span>
    <div class="theme-controls">
      <button class="mode-btn" id="modeBtn" type="button" aria-pressed="false" aria-label="Toggle light and dark mode">◐ mode</button>
      <div class="swatches" role="group" aria-label="Accent color">
        <button class="swatch" data-c="teal" aria-pressed="true" aria-label="Amber and teal accent" type="button"></button>
        <button class="swatch" data-c="rose" aria-pressed="false" aria-label="Rose accent" type="button"></button>
        <button class="swatch" data-c="violet" aria-pressed="false" aria-label="Violet accent" type="button"></button>
        <button class="swatch" data-c="mono" aria-pressed="false" aria-label="Monochrome accent" type="button"></button>
      </div>
    </div>
  </div>

  <div class="panel">
    <p class="eyebrow">Draft assistant</p>
    <h1>Blog Post Helper</h1>
    <p class="sub">Give it a topic. It writes an introduction to open your post with.</p>

    <label for="topic" class="legend-visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Blog post topic</label>
    <div class="field-row">
      <span class="prompt-glyph" aria-hidden="true">&gt;</span>
      <input id="topic" type="text" placeholder="e.g. why home labs are worth the electricity bill" autocomplete="off">
    </div>

    <fieldset class="options-row">
      <legend>Generation options</legend>
      <div class="select-wrap">
        <label for="tone">tone</label>
        <select id="tone" aria-label="Tone">
          <option value="casual, conversational">casual</option>
          <option value="professional and polished">professional</option>
          <option value="punchy and energetic">punchy</option>
          <option value="academic and precise">academic</option>
          <option value="storytelling, narrative">storytelling</option>
        </select>
      </div>
      <div class="select-wrap">
        <label for="length">length</label>
        <select id="length" aria-label="Length in words">
          <option value="50">50 words</option>
          <option value="100" selected>100 words</option>
          <option value="150">150 words</option>
          <option value="200">200 words</option>
        </select>
      </div>
      <label class="variants-toggle">
        <input type="checkbox" id="variantsToggle">
        generate 3 variants
      </label>
    </fieldset>

    <div class="generate-row">
      <button id="generateBtn" type="button" onclick="generateIntro()">Generate →</button>
    </div>
    <p class="hint">Press Enter in the topic field or click Generate.</p>

    <div class="output-wrap" id="outputWrap" aria-live="polite"></div>
  </div>
</div>

<script>
  const topicInput = document.getElementById('topic');
  const toneSelect = document.getElementById('tone');
  const lengthSelect = document.getElementById('length');
  const variantsToggle = document.getElementById('variantsToggle');
  const btn = document.getElementById('generateBtn');
  const outputWrap = document.getElementById('outputWrap');
  const modeBtn = document.getElementById('modeBtn');
  const swatches = document.querySelectorAll('.swatch');

  let currentTopic = '';
  let currentDrafts = [];

  topicInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') generateIntro(); });

  modeBtn.addEventListener('click', () => {
    const html = document.documentElement;
    const isLight = html.getAttribute('data-mode') === 'light';
    html.setAttribute('data-mode', isLight ? 'dark' : 'light');
    modeBtn.setAttribute('aria-pressed', String(!isLight));
    modeBtn.textContent = isLight ? '◐ mode' : '◑ mode';
  });

  swatches.forEach(sw => {
    sw.addEventListener('click', () => {
      document.documentElement.setAttribute('data-accent', sw.dataset.c);
      swatches.forEach(s => s.setAttribute('aria-pressed', 'false'));
      sw.setAttribute('aria-pressed', 'true');
    });
  });

  function countWords(text) { return text.trim().split(/\s+/).filter(Boolean).length; }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function extractJson(text) {
    const cleaned = text.replace(/```json|```/g, '').trim();
    return JSON.parse(cleaned);
  }

  async function callClaude(promptText) {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1200,
        messages: [{ role: "user", content: promptText }]
      })
    });
    if (!response.ok) throw new Error(`Request failed (${response.status})`);
    const data = await response.json();
    const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
    if (!text) throw new Error("No text came back.");
    return text;
  }

  async function generateIntro() {
    const topic = topicInput.value.trim();
    if (!topic) { topicInput.focus(); return; }

    const tone = toneSelect.value;
    const length = lengthSelect.value;
    const wantVariants = variantsToggle.checked;
    const variantCount = wantVariants ? 3 : 1;

    currentTopic = topic;
    setBusy(true, 'drafting');
    outputWrap.innerHTML = `
      <div class="output-label"><span>generating</span><span class="line"></span></div>
      <div class="status"><div class="spinner"></div> writing ${variantCount > 1 ? variantCount + ' takes' : 'an introduction'} on "${escapeHtml(topic)}"…</div>
    `;

    const prompt = `Write ${variantCount > 1 ? variantCount + ' distinct' : 'a'} blog post introduction${variantCount > 1 ? 's' : ''} of about ${length} words each on the topic: "${topic}". Tone: ${tone}. Each should hook the reader in the first sentence and end on a line that makes them want to keep reading. Also suggest one short blog post title that fits the topic.
Return ONLY valid JSON, no markdown fences, no preamble, in exactly this shape:
{"title": "...", "intros": [${Array(variantCount).fill('"..."').join(', ')}]}`;

    try {
      const raw = await callClaude(prompt);
      const parsed = extractJson(raw);
      currentDrafts = parsed.intros || [];
      renderDrafts(parsed.title, currentDrafts, topic);
    } catch (err) {
      renderError(err);
    } finally {
      setBusy(false);
    }
  }

  function renderDrafts(title, intros, topic) {
    const cards = intros.map((intro, i) => {
      const wc = countWords(intro);
      return `
        <div class="draft-card">
          <div class="draft">${escapeHtml(intro)}<span class="cursor"></span></div>
          <div class="draft-footer">
            <span class="word-count">${wc} words${intros.length > 1 ? ' · variant ' + (i + 1) : ''}</span>
            <button class="small-btn" type="button" onclick="copyDraft(${i})">Copy</button>
          </div>
        </div>
      `;
    }).join('');

    outputWrap.innerHTML = `
      <div class="output-label"><span>introduction</span><span class="line"></span></div>
      ${title ? `<p class="draft-title">${escapeHtml(title)}</p>` : ''}
      ${cards}
      <div class="refine-row">
        <input id="refineInput" type="text" placeholder="refine, e.g. 'make it punchier'" aria-label="Refinement instruction">
        <button type="button" onclick="refineDraft()">Refine →</button>
      </div>
    `;

    const refineInput = document.getElementById('refineInput');
    refineInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') refineDraft(); });
  }

  function renderError(err) {
    outputWrap.innerHTML = `
      <div class="output-label"><span>error</span><span class="line"></span></div>
      <div class="error-box">Couldn't generate a draft: ${escapeHtml(err.message)}. Try again.</div>
    `;
  }

  async function refineDraft() {
    const refineInput = document.getElementById('refineInput');
    const instruction = refineInput.value.trim();
    if (!instruction || !currentDrafts.length) return;

    setBusy(true, 'refining');
    const baseDraft = currentDrafts[0];
    const prompt = `Here is a blog post introduction: "${baseDraft}"
Revise it based on this instruction: "${instruction}". Keep it roughly the same length.
Return ONLY valid JSON, no markdown fences, no preamble, in exactly this shape:
{"intro": "..."}`;

    try {
      const raw = await callClaude(prompt);
      const parsed = extractJson(raw);
      currentDrafts = [parsed.intro];
      renderDrafts(null, currentDrafts, currentTopic);
    } catch (err) {
      renderError(err);
    } finally {
      setBusy(false);
    }
  }

  function copyDraft(i) {
    navigator.clipboard.writeText(currentDrafts[i]).catch(() => {});
  }

  function setBusy(isBusy, label) {
    btn.disabled = isBusy;
    topicInput.disabled = isBusy;
    btn.setAttribute('aria-busy', String(isBusy));
    btn.textContent = isBusy ? (label === 'refining' ? 'Refining…' : 'Writing…') : 'Generate →';
  }
</script>

</body>
</html>
